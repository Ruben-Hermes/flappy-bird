<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      overflow: hidden;
    }
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    canvas {
      border: 3px solid #4ecca3;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(78, 204, 163, 0.3);
      background: #70c5ce;
      cursor: pointer;
    }
    .score-display {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
    }
    .score-display span {
      color: #4ecca3;
      font-size: 28px;
    }
    .instructions {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="score-display">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="600"></canvas>
    <div class="instructions">Press <b>Space</b>, <b>↑</b>, or <b>Click</b> to flap</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // --- Tunable physics ---
    const GRAVITY       = 0.05;    // 4x floatier
    const FLAP_STRENGTH = -6.0;    // 2x higher jumps
    const FLAP_COOLDOWN  = 120;    // ms between flaps (stops key-repeat abuse)
    const PIPE_WIDTH    = 60;
    const PIPE_GAP      = 160;
    const PIPE_SPEED    = 1.5;
    const PIPE_SPACING  = 280;
    const GROUND_HEIGHT = 80;

    // --- State ---
    let bird, pipes, score, gameOver, gameStarted, loadTime, frame;
    let lastFlap = 0;

    function reset() {
      bird = { x: 100, y: canvas.height * 0.4, vy: 0, radius: 16 };
      pipes = [];
      score = 0;
      gameOver   = false;
      gameStarted = false;
      scoreEl.textContent = '0';
    }

    // --- Collision ---
    function circleRect(cx, cy, r, rx, ry, rw, rh) {
      const cx2 = Math.max(rx, Math.min(cx, rx + rw));
      const cy2 = Math.max(ry, Math.min(cy, ry + rh));
      return (cx - cx2) ** 2 + (cy - cy2) ** 2 < r * r;
    }

    function hitTest() {
      const b = bird;
      if (b.y - b.radius <= 0 || b.y + b.radius >= canvas.height - GROUND_HEIGHT) return true;
      for (const p of pipes) {
        if (circleRect(b.x, b.y, b.radius, p.x, 0, PIPE_WIDTH, p.top)) return true;
        if (circleRect(b.x, b.y, b.radius, p.x, p.bottom, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - p.bottom)) return true;
      }
      return false;
    }

    // --- Pipes ---
    function spawnPipe() {
      const headroom = 50;
      const maxTop = canvas.height - GROUND_HEIGHT - PIPE_GAP - headroom;
      const top = Math.floor(Math.random() * (maxTop - headroom + 1)) + headroom;
      pipes.push({ x: canvas.width, top, bottom: top + PIPE_GAP, scored: false });
    }

    function update() {
      if (gameOver) return;

      bird.vy += GRAVITY;
      bird.y  += bird.vy;

      for (const p of pipes) p.x -= PIPE_SPEED;
      while (pipes.length && pipes[0].x + PIPE_WIDTH < 0) pipes.shift();

      for (const p of pipes) {
        if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
          p.scored = true;
          score++;
          scoreEl.textContent = score;
        }
      }

      const last = pipes[pipes.length - 1];
      if (!pipes.length || last.x < canvas.width - PIPE_SPACING) spawnPipe();

      if (hitTest()) gameOver = true;
    }

    // --- Drawing ---
    function drawGround() {
      const y = canvas.height - GROUND_HEIGHT;
      ctx.fillStyle = '#2d8a4e';
      ctx.fillRect(0, y, canvas.width, GROUND_HEIGHT);
      ctx.fillStyle = '#3cb861';
      ctx.fillRect(0, y, canvas.width, 12);
      ctx.strokeStyle = '#1e6a38';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, y, canvas.width, 0);
    }

    function drawBird() {
      const { x, y, radius: r } = bird;
      const angle = Math.min(Math.max(bird.vy * 0.12, -0.6), 0.9);

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      // Body
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#e6b800'; ctx.lineWidth = 2; ctx.stroke();

      // Wing
      ctx.fillStyle = '#ffa500';
      ctx.beginPath(); ctx.ellipse(-7, 4, 10, 6, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#e68a00'; ctx.lineWidth = 1.5; ctx.stroke();

      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(7, -4, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(9, -4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(10, -5, 1.2, 0, Math.PI * 2); ctx.fill();

      // Beak
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.moveTo(14, -2); ctx.lineTo(24, 0); ctx.lineTo(14, 4); ctx.closePath(); ctx.fill();

      ctx.restore();
    }

    function drawPipe(p) {
      const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
      grad.addColorStop(0, '#2ecc71');
      grad.addColorStop(0.5, '#27ae60');
      grad.addColorStop(1, '#1e8449');

      const capH = 24, capW = 8;
      // Top pipe
      ctx.fillStyle = grad;
      ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
      ctx.fillStyle = '#1abc9c';
      ctx.fillRect(p.x - capW / 2, p.top - capH, PIPE_WIDTH + capW, capH);
      // Bottom pipe
      ctx.fillStyle = grad;
      ctx.fillRect(p.x, p.bottom, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - p.bottom);
      ctx.fillStyle = '#1abc9c';
      ctx.fillRect(p.x - capW / 2, p.bottom, PIPE_WIDTH + capW, capH);
    }

    function drawBg() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of pipes) drawPipe(p);
      drawGround();
      drawBird();
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 30);
      ctx.font = '20px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 15);
      ctx.font = '16px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('Press Space or Click to restart', canvas.width / 2, canvas.height / 2 + 50);
      ctx.textAlign = 'start';
    }

    // --- Loop ---
    function loop(now) {
      if (gameStarted && !gameOver) update();
      drawBg();

      if (!gameStarted && !gameOver) {
        // Bob the bird in idle
        const t = now / 600;
        bird.y = canvas.height * 0.4 + Math.sin(t) * 6;

        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Tap to Start!', canvas.width / 2, canvas.height / 2 - 60);
        ctx.textAlign = 'start';
      }

      if (gameOver) drawGameOver();
      frame = requestAnimationFrame(loop);
    }

    // --- Input ---
    function flap() {
      // Guard: ignore clicks within 400ms of page load (e.g. double-click opening file)
      if (Date.now() - loadTime < 400) return;

      // Cooldown: prevent key-repeat from flooding flaps
      if (gameStarted && !gameOver && Date.now() - lastFlap < FLAP_COOLDOWN) return;
      lastFlap = Date.now();

      if (gameOver) { reset(); gameStarted = true; }
      if (!gameStarted) { gameStarted = true; spawnPipe(); }
      bird.vy = FLAP_STRENGTH;
    }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
    });
    canvas.addEventListener('click', flap);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

    // --- Go ---
    loadTime = Date.now();
    reset();
    requestAnimationFrame(loop);

    // Test hook (safe to leave in — just exposes read-only state)
    window.__game = { get bird() { return bird; }, get pipes() { return pipes; }, get score() { return score; }, get gameOver() { return gameOver; }, get gameStarted() { return gameStarted; } };
  </script>
</body>
</html>

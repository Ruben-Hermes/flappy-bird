<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      overflow: hidden;
    }
    .game-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    canvas {
      border: 3px solid #4ecca3;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(78, 204, 163, 0.3);
      background: #70c5ce;
    }
    .score-display {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
    }
    .score-display span {
      color: #4ecca3;
      font-size: 28px;
    }
    .instructions {
      color: #aaa;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="score-display">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="600"></canvas>
    <div class="instructions">Press <b>Space</b>, <b>↑</b>, or <b>Click</b> to flap</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // --- Constants ---
    const GRAVITY = 0.5;
    const FLAP_STRENGTH = -8;
    const PIPE_WIDTH = 60;
    const PIPE_GAP = 140;
    const PIPE_SPEED = 2.5;
    const PIPE_SPACING = 200;
    const GROUND_HEIGHT = 80;

    // --- Game State ---
    let bird, pipes, score, gameOver, gameStarted, frame;

    function reset() {
      bird = { x: 100, y: canvas.height / 2, vy: 0, radius: 18 };
      pipes = [];
      score = 0;
      gameOver = false;
      gameStarted = false;
      scoreEl.textContent = '0';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawIdle();
    }

    // --- Collision: circle vs. AABB ---
    function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return dx * dx + dy * dy < r * r;
    }

    function checkCollision() {
      const b = bird;
      // Ground / ceiling
      if (b.y - b.radius <= 0 || b.y + b.radius >= canvas.height - GROUND_HEIGHT) return true;
      // Pipes
      for (const p of pipes) {
        if (circleRectCollision(b.x, b.y, b.radius, p.x, 0, PIPE_WIDTH, p.top)) return true;
        if (circleRectCollision(b.x, b.y, b.radius, p.x, p.bottom, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - p.bottom)) return true;
      }
      return false;
    }

    // --- Spawn pipes ---
    function spawnPipe() {
      const minTop = 50;
      const maxTop = canvas.height - GROUND_HEIGHT - PIPE_GAP - 50;
      const top = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
      pipes.push({ x: canvas.width, top, bottom: top + PIPE_GAP, scored: false });
    }

    // --- Update ---
    function update() {
      if (gameOver) return;

      bird.vy += GRAVITY;
      bird.y += bird.vy;

      // Move pipes
      for (const p of pipes) p.x -= PIPE_SPEED;

      // Remove off-screen pipes
      while (pipes.length && pipes[0].x + PIPE_WIDTH < 0) pipes.shift();

      // Scoring
      for (const p of pipes) {
        if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
          p.scored = true;
          score++;
          scoreEl.textContent = score;
        }
      }

      // Spawn new pipes
      if (!pipes.length || pipes[pipes.length - 1].x < canvas.width - PIPE_SPACING) {
        spawnPipe();
      }

      if (checkCollision()) {
        gameOver = true;
      }
    }

    // --- Draw ---
    function drawGround() {
      const y = canvas.height - GROUND_HEIGHT;
      // Grass
      ctx.fillStyle = '#2d8a4e';
      ctx.fillRect(0, y, canvas.width, GROUND_HEIGHT);
      ctx.fillStyle = '#3cb861';
      ctx.fillRect(0, y, canvas.width, 12);
      // Ground line
      ctx.strokeStyle = '#1e6a38';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }

    function drawBird() {
      const { x, y, radius } = bird;
      const angle = Math.min(Math.max(bird.vy * 0.1, -0.5), 0.8);

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      // Body
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#e6b800';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Wing
      ctx.fillStyle = '#ffa500';
      ctx.beginPath();
      ctx.ellipse(-8, 4, 10, 6, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#e68a00';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(8, -4, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(10, -4, 3.5, 0, Math.PI * 2);
      ctx.fill();

      // Beak
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.moveTo(16, -2);
      ctx.lineTo(26, 0);
      ctx.lineTo(16, 4);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawPipe(pipe) {
      const { x, top, bottom } = pipe;
      const grad = ctx.createLinearGradient(x, 0, x + PIPE_WIDTH, 0);
      grad.addColorStop(0, '#2ecc71');
      grad.addColorStop(0.5, '#27ae60');
      grad.addColorStop(1, '#1e8449');

      // Top pipe
      ctx.fillStyle = grad;
      ctx.fillRect(x, 0, PIPE_WIDTH, top);
      // Top cap
      ctx.fillStyle = '#1abc9c';
      ctx.fillRect(x - 4, top - 24, PIPE_WIDTH + 8, 24);
      ctx.strokeStyle = '#148f77';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 4, top - 24, PIPE_WIDTH + 8, 24);

      // Bottom pipe
      ctx.fillStyle = grad;
      ctx.fillRect(x, bottom, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - bottom);
      // Bottom cap
      ctx.fillStyle = '#1abc9c';
      ctx.fillRect(x - 4, bottom, PIPE_WIDTH + 8, 24);
      ctx.strokeStyle = '#148f77';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 4, bottom, PIPE_WIDTH + 8, 24);

      // Pipe body outlines
      ctx.strokeStyle = '#148f77';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, 0, PIPE_WIDTH, top);
      ctx.strokeRect(x, bottom, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - bottom);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 30);

      ctx.font = '20px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 15);

      ctx.font = '16px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('Press Space or Click to restart', canvas.width / 2, canvas.height / 2 + 50);
      ctx.textAlign = 'start';
    }

    function drawIdle() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGround();
      drawBird();

      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Tap to Start!', canvas.width / 2, canvas.height / 2 - 60);
      ctx.textAlign = 'start';
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of pipes) drawPipe(p);
      drawGround();
      drawBird();
      if (gameOver) drawGameOver();
    }

    // --- Game Loop ---
    function loop() {
      if (gameStarted && !gameOver) update();
      draw();
      frame = requestAnimationFrame(loop);
    }

    function flap() {
      if (gameOver) {
        reset();
        gameStarted = true;
        return;
      }
      if (!gameStarted) {
        gameStarted = true;
        spawnPipe();
      }
      bird.vy = FLAP_STRENGTH;
    }

    // --- Input ---
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        flap();
      }
    });
    canvas.addEventListener('click', () => flap());

    // --- Start ---
    reset();
    loop();
  </script>
</body>
</html>

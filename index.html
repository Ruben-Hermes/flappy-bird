<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .game-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
    }
    @media (min-width: 440px) {
      .game-wrapper {
        max-width: 400px;
        max-height: 600px;
      }
      canvas {
        border-radius: 12px;
      }
    }
    .score-display {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 10;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    .score-display span {
      color: #fff;
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="score-display">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // --- Images ---
    const bgImg = new Image();
    bgImg.src = 'background.png';

    const roofImgs = [new Image(), new Image()];
    roofImgs[0].src = 'roof1.png';
    roofImgs[1].src = 'roof2.png';

    const floorImgs = [new Image(), new Image()];
    floorImgs[0].src = 'floor1.png';
    floorImgs[1].src = 'floor2.png';

    // --- Tunable physics ---
    const GRAVITY       = 0.4;     // standard gravity
    const FLAP_STRENGTH = -6.3;    // +15% higher jumps
    const FLAP_COOLDOWN  = 150;    // ms between flaps
    const PIPE_WIDTH    = 60;
    const PIPE_GAP      = 140;
    const PIPE_SPEED    = 2.5;
    const PIPE_SPACING  = 200;
    const GROUND_HEIGHT = 80;

    // --- State ---
    let bird, pipes, score, gameOver, gameStarted, loadTime, frame;
    let lastFlap = 0;

    function reset() {
      bird = { x: 100, y: canvas.height * 0.4, vy: 0, radius: 16 };
      pipes = [];
      score = 0;
      gameOver   = false;
      gameStarted = false;
      scoreEl.textContent = '0';
    }

    // --- Collision ---
    function circleRect(cx, cy, r, rx, ry, rw, rh) {
      const cx2 = Math.max(rx, Math.min(cx, rx + rw));
      const cy2 = Math.max(ry, Math.min(cy, ry + rh));
      return (cx - cx2) ** 2 + (cy - cy2) ** 2 < r * r;
    }

    function hitTest() {
      const b = bird;
      if (b.y - b.radius <= 0 || b.y + b.radius >= canvas.height - GROUND_HEIGHT) return true;
      for (const p of pipes) {
        if (circleRect(b.x, b.y, b.radius, p.x, 0, PIPE_WIDTH, p.top)) return true;
        if (circleRect(b.x, b.y, b.radius, p.x, p.bottom, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - p.bottom)) return true;
      }
      return false;
    }

    // --- Pipes ---
    function spawnPipe() {
      const headroom = 50;
      const maxTop = canvas.height - GROUND_HEIGHT - PIPE_GAP - headroom;
      const top = Math.floor(Math.random() * (maxTop - headroom + 1)) + headroom;
      const roofIdx = Math.floor(Math.random() * 2);   // 0 or 1
      const floorIdx = Math.floor(Math.random() * 2);  // 0 or 1
      pipes.push({ x: canvas.width, top, bottom: top + PIPE_GAP, scored: false, roofIdx, floorIdx });
    }

    function update() {
      if (gameOver) return;

      bird.vy += GRAVITY;
      bird.y  += bird.vy;

      for (const p of pipes) p.x -= PIPE_SPEED;
      while (pipes.length && pipes[0].x + PIPE_WIDTH < 0) pipes.shift();

      for (const p of pipes) {
        if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
          p.scored = true;
          score++;
          scoreEl.textContent = score;
        }
      }

      const last = pipes[pipes.length - 1];
      if (!pipes.length || last.x < canvas.width - PIPE_SPACING) spawnPipe();

      if (hitTest()) gameOver = true;
    }

    // --- Drawing ---
    function drawGround() {
      const y = canvas.height - GROUND_HEIGHT;
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, y, canvas.width, GROUND_HEIGHT);
      ctx.fillStyle = '#333';
      ctx.fillRect(0, y, canvas.width, 4);
    }

    function drawBird() {
      const { x, y, radius: r } = bird;
      const angle = Math.min(Math.max(bird.vy * 0.12, -0.6), 0.9);
      const s = r / 16;  // scale factor (original radius was 16)

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      // Red cap
      ctx.fillStyle = '#e52521';
      ctx.beginPath(); ctx.arc(0, -8*s, 10*s, Math.PI, 0); ctx.fill();

      // Face
      ctx.fillStyle = '#fbbf90';
      ctx.beginPath(); ctx.arc(0, 0, 9*s, 0, Math.PI * 2); ctx.fill();

      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-3*s, -3*s, 3*s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3*s, -3*s, 3*s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-2.5*s, -2.5*s, 1.5*s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3.5*s, -2.5*s, 1.5*s, 0, Math.PI * 2); ctx.fill();

      // Mustache
      ctx.fillStyle = '#6b3304';
      ctx.beginPath(); ctx.ellipse(-3*s, 2*s, 4*s, 2*s, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(3*s, 2*s, 4*s, 2*s, 0, 0, Math.PI * 2); ctx.fill();

      // Nose
      ctx.fillStyle = '#fbbf90';
      ctx.beginPath(); ctx.arc(0, 0, 2.5*s, 0, Math.PI * 2); ctx.fill();

      // Body (blue overalls)
      ctx.fillStyle = '#1a55d4';
      ctx.fillRect(-7*s, 8*s, 14*s, 10*s);

      // Red shirt
      ctx.fillStyle = '#e52521';
      ctx.fillRect(-6*s, 4*s, 12*s, 5*s);

      // Overall straps
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(-5*s, 4*s, 2.5*s, 6*s);
      ctx.fillRect(2.5*s, 4*s, 2.5*s, 6*s);

      ctx.restore();
    }

    function drawPipe(p) {
      const roof = roofImgs[p.roofIdx];
      const floor = floorImgs[p.floorIdx];
      const playArea = canvas.height - GROUND_HEIGHT;

      // Top pipe: stretch roof image to fill from top to gap
      ctx.drawImage(roof, p.x, 0, PIPE_WIDTH, p.top);

      // Bottom pipe: stretch floor image to fill from gap to ground
      const btmH = playArea - p.bottom;
      ctx.drawImage(floor, p.x, p.bottom, PIPE_WIDTH, btmH);
    }

    function drawBg() {
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      for (const p of pipes) drawPipe(p);
      drawGround();
      drawBird();
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 30);
      ctx.font = '20px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 15);
      ctx.font = '16px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#ccc';
      ctx.fillText('Press Space or Click to restart', canvas.width / 2, canvas.height / 2 + 50);
      ctx.textAlign = 'start';
    }

    // --- Loop ---
    function loop(now) {
      if (gameStarted && !gameOver) update();
      drawBg();

      if (!gameStarted && !gameOver) {
        // Bob the bird in idle
        const t = now / 600;
        bird.y = canvas.height * 0.4 + Math.sin(t) * 6;

        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Tap to Start!', canvas.width / 2, canvas.height / 2 - 60);
        ctx.textAlign = 'start';
      }

      if (gameOver) drawGameOver();
      frame = requestAnimationFrame(loop);
    }

    // --- Input ---
    function flap() {
      // Guard: ignore clicks within 400ms of page load (e.g. double-click opening file)
      if (Date.now() - loadTime < 400) return;

      // Cooldown: prevent key-repeat from flooding flaps
      if (gameStarted && !gameOver && Date.now() - lastFlap < FLAP_COOLDOWN) return;
      lastFlap = Date.now();

      if (gameOver) { reset(); gameStarted = true; }
      if (!gameStarted) { gameStarted = true; spawnPipe(); }
      bird.vy = FLAP_STRENGTH;
    }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
    });
    canvas.addEventListener('click', flap);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

    // --- Go ---
    loadTime = Date.now();
    reset();
    requestAnimationFrame(loop);

    // Test hook (safe to leave in — just exposes read-only state)
    window.__game = { get bird() { return bird; }, get pipes() { return pipes; }, get score() { return score; }, get gameOver() { return gameOver; }, get gameStarted() { return gameStarted; } };
  </script>
</body>
</html>
